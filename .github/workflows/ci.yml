name: CI

on:
  push:
    branches:
      - master
      - release/**
      - feature/**
  pull_request:
    branches:
      - master
      - release/**

jobs:
  smoke-whatif-tasks-range-ps51:
    name: Smoke (WhatIf + Tasks Range) (PS5.1)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke scenario (PS5.1)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path test-results\deletedpaths -Force | Out-Null
          powershell -NoProfile -ExecutionPolicy Bypass -File .\PC_Optimizer.ps1 `
            -NonInteractive -WhatIf -NoRebootPrompt `
            -Tasks "1-5,7,10-12" -FailureMode continue `
            -ExportDeletedPaths json -ExportDeletedPathsPath ".\test-results\deletedpaths" *>&1 |
            Tee-Object -FilePath "test-results\smoke_ps51.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload deleted path artifact on failure (PS5.1)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-deletedpaths-ps51
          path: |
            test-results/deletedpaths/*
            test-results/smoke_ps51.log
          retention-days: 14

  smoke-whatif-tasks-range-ps7:
    name: Smoke (WhatIf + Tasks Range) (PS7)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke scenario (PS7)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path test-results/deletedpaths -Force | Out-Null
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\PC_Optimizer.ps1 `
            -NonInteractive -WhatIf -NoRebootPrompt `
            -Tasks "1-5,7,10-12" -FailureMode continue `
            -ExportDeletedPaths json -ExportDeletedPathsPath ".\test-results\deletedpaths" *>&1 |
            Tee-Object -FilePath "test-results/smoke_ps7.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload deleted path artifact on failure (PS7)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-deletedpaths-ps7
          path: |
            test-results/deletedpaths/*
            test-results/smoke_ps7.log
          retention-days: 14

  test-powershell-51:
    name: Test (Windows PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Test_PCOptimizer.ps1 (PS5.1)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path test-results -Force | Out-Null
          powershell -NoProfile -ExecutionPolicy Bypass -File tests\Test_PCOptimizer.ps1 *>&1 |
            Tee-Object -FilePath test-results\ps51_Test_PCOptimizer.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Test_Encoding.ps1 (PS5.1)
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File Test_Encoding.ps1 *>&1 |
            Tee-Object -FilePath test-results\ps51_Test_Encoding.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Test_CLIModes.ps1 (PS5.1)
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File tests\Test_CLIModes.ps1 *>&1 |
            Tee-Object -FilePath test-results\ps51_Test_CLIModes.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Test_TasksValidation.ps1 (PS5.1)
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File tests\Test_TasksValidation.ps1 *>&1 |
            Tee-Object -FilePath test-results\ps51_Test_TasksValidation.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Test_ReportSchema.ps1 (PS5.1)
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File tests\Test_ReportSchema.ps1 *>&1 |
            Tee-Object -FilePath test-results\ps51_Test_ReportSchema.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Test_WhatIfExport.ps1 (PS5.1)
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File tests\Test_WhatIfExport.ps1 *>&1 |
            Tee-Object -FilePath test-results\ps51_Test_WhatIfExport.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Upload test logs (PS5.1)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-ps51
          path: test-results/*.log
          retention-days: 14

  test-powershell-7:
    name: Test (PowerShell 7)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Test_PCOptimizer.ps1 (PS7)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path test-results -Force | Out-Null
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/Test_PCOptimizer.ps1 *>&1 |
            Tee-Object -FilePath test-results/ps7_Test_PCOptimizer.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Test_Encoding.ps1 (PS7)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File Test_Encoding.ps1 *>&1 |
            Tee-Object -FilePath test-results/ps7_Test_Encoding.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Test_CLIModes.ps1 (PS7)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/Test_CLIModes.ps1 *>&1 |
            Tee-Object -FilePath test-results/ps7_Test_CLIModes.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Test_TasksValidation.ps1 (PS7)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/Test_TasksValidation.ps1 *>&1 |
            Tee-Object -FilePath test-results/ps7_Test_TasksValidation.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Test_ReportSchema.ps1 (PS7)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/Test_ReportSchema.ps1 *>&1 |
            Tee-Object -FilePath test-results/ps7_Test_ReportSchema.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Test_WhatIfExport.ps1 (PS7)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/Test_WhatIfExport.ps1 *>&1 |
            Tee-Object -FilePath test-results/ps7_Test_WhatIfExport.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Upload test logs (PS7)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-ps7
          path: test-results/*.log
          retention-days: 14

  pester-aggregated:
    name: Pester Aggregated (${{ matrix.ps }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - ps: ps51
            shell: powershell
          - ps: ps7
            shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: ${{ matrix.shell }}
        run: |
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.0.0

      - name: Run aggregated Invoke-Pester
        shell: ${{ matrix.shell }}
        run: |
          New-Item -ItemType Directory -Path test-results -Force | Out-Null
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = @(
            "tests\PCOptimizer.Pester.Tests.ps1",
            "tests\AgentTeams.Pester.Tests.ps1",
            "tests\LegacyScripts.Pester.Tests.ps1"
          )
          $cfg.Run.Exit = $false
          $cfg.CodeCoverage.Enabled = $true
          $cfg.CodeCoverage.Path = @("PC_Optimizer.ps1","modules\*.psm1")
          $cfg.CodeCoverage.OutputFormat = "JaCoCo"
          $cfg.CodeCoverage.OutputPath = "test-results\coverage_${{ matrix.ps }}.xml"
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputFormat = "NUnitXml"
          $cfg.TestResult.OutputPath = "test-results\pester_${{ matrix.ps }}.xml"
          $result = Invoke-Pester -Configuration $cfg
          $pct = [double]$result.CodeCoverage.CoveragePercent
          if ($result.FailedCount -gt 0) { throw "Pester failed. FailedCount=$($result.FailedCount)" }
          if ($pct -lt 20) { throw "Coverage threshold failed: $pct < 20" }

      - name: Upload Pester artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-aggregated-${{ matrix.ps }}
          path: |
            test-results/pester_${{ matrix.ps }}.xml
            test-results/coverage_${{ matrix.ps }}.xml
          retention-days: 14

  agent-teams-e2e:
    name: Agent Teams E2E + Schema Validation (${{ matrix.ps }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - ps: ps51
            shell: powershell
            engine: powershell
          - ps: ps7
            shell: pwsh
            engine: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Agent Teams E2E validation
        shell: ${{ matrix.shell }}
        run: |
          New-Item -ItemType Directory -Path test-results -Force | Out-Null
          ${{ matrix.engine }} -NoProfile -ExecutionPolicy Bypass -File tests\AgentTeams.E2E.Validation.ps1 -Engine ${{ matrix.engine }} *>&1 |
            Tee-Object -FilePath test-results\agent_teams_e2e_${{ matrix.ps }}.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Agent Teams E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-teams-e2e-artifacts-${{ matrix.ps }}
          path: |
            test-results/agent_teams_e2e_${{ matrix.ps }}.log
            reports/Audit_Run_*.json
            reports/PowerBI_Dashboard_latest.json
            reports/agent-teams/AgentTeams_*.json
            reports/agent-teams/metrics/*.json
            reports/mcp/*.json
            reports/mcp/dead-letter/*.json
            reports/mcp/rollback/*.json
            logs/hooks/queue/*.json
            logs/hooks/queue/done/*.json
          retention-days: 14

  agent-teams-load:
    name: Agent Teams Load (${{ matrix.ps }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - ps: ps51
            shell: powershell
            engine: powershell
          - ps: ps7
            shell: pwsh
            engine: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Agent Teams load test
        shell: ${{ matrix.shell }}
        run: |
          New-Item -ItemType Directory -Path test-results -Force | Out-Null
          ${{ matrix.engine }} -NoProfile -ExecutionPolicy Bypass -File tests\AgentTeams.LoadTest.ps1 -Engine ${{ matrix.engine }} -Iterations 3 -MaxAllowedP95Seconds 150 *>&1 |
            Tee-Object -FilePath test-results\agent_teams_load_${{ matrix.ps }}.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Agent Teams load artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-teams-load-artifacts-${{ matrix.ps }}
          path: |
            test-results/agent_teams_load_${{ matrix.ps }}.log
            test-results/agent_teams_load_*.json
            reports/Audit_Run_*.json
          retention-days: 14


