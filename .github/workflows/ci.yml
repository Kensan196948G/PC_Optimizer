name: CI

on:
  push:
    branches:
      - master
      - release/**
      - feature/**
  pull_request:
    branches:
      - master
      - release/**

jobs:
  test-powershell-51:
    name: Test (Windows PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Test_PCOptimizer.ps1 (PS5.1)
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File tests\Test_PCOptimizer.ps1

      - name: Run Test_Encoding.ps1 (PS5.1)
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File Test_Encoding.ps1

  test-powershell-7:
    name: Test (PowerShell 7)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Test_PCOptimizer.ps1 (PS7)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/Test_PCOptimizer.ps1

      - name: Run Test_Encoding.ps1 (PS7)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File Test_Encoding.ps1
