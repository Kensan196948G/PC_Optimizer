            failedTestLogs = @(Get-ChildItem test-results -Filter "*.log" -ErrorAction SilentlyContinue | Where-Object { (Get-Content $_.FullName -Tail 3 -ErrorAction SilentlyContinue) -match "FAIL" } | Select-Object -ExpandProperty Name)
          }
          $meta | ConvertTo-Json -Depth 4 | Out-File -FilePath test-results/diag_meta_ps7.json -Encoding utf8NoBOM
          Write-Host "[diag] diagnostics collected -> test-results/diag_meta_ps7.json"

      - name: Upload diagnostics on failure (PS7)
        if: failure()
